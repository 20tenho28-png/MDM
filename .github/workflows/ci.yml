name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mdm-tests:
    name: Ticket wall + simulator (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q

  circuit-planner-tests:
    name: Circuit Planner (npm test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run tests
        run: npm test
        working-directory: circuit-planner
